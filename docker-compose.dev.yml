services:
  db:
    image: postgres:16-alpine
    container_name: pms_db_dev
    environment:
      POSTGRES_USER: pms_user
      POSTGRES_PASSWORD: pms_password
      POSTGRES_DB: pms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pms_user -d pms_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
